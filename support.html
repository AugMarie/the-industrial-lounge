<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Support &mdash; The Industrial Lounge</title>

<meta name="description" content="Support The Industrial Lounge through merch and listener support.">
<meta name="author" content="The Industrial Lounge">

<style>
* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: #000;
    color: #d8d8d8;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 30px 18px;
}

.page {
    width: 100%;
    max-width: 760px;
}

.nav {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin: 0 0 26px 0;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
}

.nav a {
    color: #666;
    text-decoration: none;
    transition: color 0.3s ease;
}

.nav a:hover,
.nav .active {
    color: #ffffff;
}

.logo-wrap {
    width: 100%;
    margin: 0 auto 28px auto;
}

.logo-wrap img {
    width: 100%;
    max-width: 420px;
    height: auto;
    display: block;
    margin: 0 auto;
    opacity: 0.82;
}

.subtitle {
    font-size: 14px;
    letter-spacing: 3px;
    color: #999;
    margin: 0 0 18px 0;
    text-transform: uppercase;
}

.support-copy {
    max-width: 560px;
    margin: 0 auto 28px auto;
    color: #777;
    font-size: 13px;
    line-height: 1.8;
}

.support-button {
    display: inline-block;
    padding: 14px 30px;
    background: #111;
    border: 1px solid #aa0000;
    color: #ff4444;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 3px;
    font-size: 12px;
    opacity: 0.75;
}

.note {
    margin-top: 22px;
    font-size: 11px;
    letter-spacing: 2px;
    color: #555;
    text-transform: uppercase;
}

.footer {
    margin-top: 48px;
    font-size: 10px;
    letter-spacing: 2px;
    color: #444;
    text-transform: uppercase;
}

@media (max-width: 600px) {
    body {
        padding: 24px 14px;
    }

    .nav {
        gap: 18px;
        font-size: 10px;
        letter-spacing: 2px;
        margin-bottom: 22px;
    }

    .logo-wrap img {
        max-width: 340px;
    }

    .subtitle {
        font-size: 11px;
        letter-spacing: 2px;
    }

    .support-copy {
        font-size: 12px;
    }
}
</style>
</head>

<body>

<div class="page">

    <nav class="nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="https://www.mixcloud.com/DJAapocalypse/" target="_blank">Mixes</a>
        <a href="support.html" class="active">Support</a>
    </nav>

    <div class="logo-wrap">
        <img src="brand_2_clean.png" alt="The Industrial Lounge">
    </div>

    <div class="subtitle">Support The Signal</div>

    <div class="support-copy">
        Merch is being prepared through Printify. Shirts, hoodies, stickers and other support items will be available here once the shop is live.
    </div>

    <span class="support-button">Coming Soon</span>

    <div class="note">Printify merch link pending</div>

    <div class="footer">
        &copy; The Industrial Lounge
    </div>

</div>

</body>
</html>
