<style>
* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: #000;
    color: #d8d8d8;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 30px 18px;
}

.page {
    width: 100%;
    max-width: 760px;
}

/* Navigation */
.nav {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin: 0 0 26px 0;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
}

.nav a {
    color: #666;
    text-decoration: none;
    transition: color 0.3s ease;
}

.nav a:hover {
    color: #ffffff;
}

.nav a:focus-visible,
.live-button:focus-visible,
.mix-link a:focus-visible {
    outline: 2px solid #ff4444;
    outline-offset: 4px;
}

/* Logo / Preview Image */
.logo-wrap {
    width: 100%;
    margin: 0 auto 28px auto;
}

.logo-wrap img {
    width: 100%;
    max-width: 512px;
    height: auto;
    display: block;
    margin: 0 auto;
    opacity: 0.88;
}

/* Subtitle */
.subtitle {
    font-size: 14px;
    font-weight: normal;
    letter-spacing: 3px;
    color: #999;
    margin: 0 0 18px 0;
    text-transform: uppercase;
}

.about {
    max-width: 520px;
    margin: 0 auto 26px auto;
    color: #777;
    font-size: 13px;
    line-height: 1.7;
}

/* Live Button */
.live-button-wrap {
    margin: 0 0 28px 0;
}

.live-button {
    display: inline-block;
    padding: 14px 30px;
    background: #111;
    border: 1px solid #aa0000;
    color: #ff4444;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 3px;
    font-size: 12px;
    transition: all 0.3s ease;
}

.live-button:hover {
    background: #aa0000;
    color: #ffffff;
    box-shadow: 0 0 12px rgba(255,0,0,0.35);
}

/* Browse Mixes Link */
.mix-link {
    margin-top: 22px;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
}

.mix-link a {
    color: #777;
    text-decoration: none;
}

.mix-link a:hover {
    color: #ffffff;
}

/* Footer */
.footer {
    margin-top: 48px;
    font-size: 10px;
    letter-spacing: 2px;
    color: #444;
    text-transform: uppercase;
}

/* Mobile adjustments */
@media (max-width: 600px) {
    body {
        padding: 24px 14px;
    }

    .nav {
        gap: 10px;
        font-size: 10px;
        letter-spacing: 2px;
        margin-bottom: 22px;
    }

    .nav a,
    .mix-link a {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        padding: 0 4px;
    }

    .live-button {
        min-height: 44px;
    }

    .subtitle {
        font-size: 11px;
        letter-spacing: 2px;
        margin-bottom: 16px;
    }

    .about {
        font-size: 12px;
        margin-bottom: 22px;
    }

    .footer {
        margin-top: 38px;
    }
}
</style>
</head>

<body>

<div class="page">

    <header>
        <nav class="nav" aria-label="Main navigation">
            <a href="https://www.mixcloud.com/live/DJAapocalypse/" target="_blank" rel="noopener noreferrer">Live</a>
            <a href="https://www.mixcloud.com/DJAapocalypse/" target="_blank" rel="noopener noreferrer">Mixes</a>
            <a href="support.html">Support</a>
        </nav>

        <!-- Main Logo / Preview Graphic -->
        <div class="logo-wrap">
            <img src="brand_2_clean.png" alt="The Industrial Lounge">
        </div>
    </header>

    <main>
        <!-- Subtitle -->
        <h1 class="subtitle">Classic Industrial Music</h1>

        <p class="about">
            Underground industrial, EBM, darkwave, electronic and new wave broadcast from the edge of the dial.
        </p>

        <!-- Live Button -->
        <div class="live-button-wrap">
            <a href="https://www.mixcloud.com/live/DJAapocalypse/" target="_blank" rel="noopener noreferrer" class="live-button">
                &#128308; LIVE NOW
            </a>
        </div>

        <!-- Browse Mixes Link -->
        <div class="mix-link">
            <a href="https://www.mixcloud.com/DJAapocalypse/" target="_blank" rel="noopener noreferrer">
                Browse Mixes
            </a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        &copy; The Industrial Lounge
    </footer>

</div>

</body>
</html>
